<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Opportunity Snapshot Demo</title>
    <link rel="stylesheet" href="./styles.css?v=20260723b">
  </head>
  <body>
    <main class="shell">
      <section class="control-panel" aria-labelledby="demo-title">
        <div class="brand-row">
          <span class="brand-mark" aria-hidden="true">AI</span>
          <div>
            <p class="kicker">Founder preview demo</p>
            <h1 id="demo-title">AI Opportunity Snapshot</h1>
          </div>
        </div>

        <form id="audit-form" class="audit-form">
          <label>
            Business type
            <input id="businessType" name="businessType" value="NorthStar Roof Care" autocomplete="off">
          </label>
          <label>
            Target buyer
            <input id="audience" name="audience" value="homeowners waiting on storm-damage estimates" autocomplete="off">
          </label>
          <label>
            Costly bottleneck
            <textarea id="bottleneck" name="bottleneck" rows="4">quote follow-up after busy storm weeks</textarea>
          </label>
          <div class="split-fields">
            <label>
              Monthly revenue
              <input id="monthlyRevenue" name="monthlyRevenue" type="number" min="1000" step="500" value="38000">
            </label>
            <label>
              Audit price
              <input id="offerPrice" name="offerPrice" type="number" min="1" step="1" value="19">
            </label>
          </div>
          <button class="primary-action" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 13h7V4h2v9h7l-8 8-8-8z"></path>
            </svg>
            Run snapshot
          </button>
        </form>

        <div class="preset-row" aria-label="Demo presets">
          <button type="button" data-preset="agency">Roofing</button>
          <button type="button" data-preset="coach">Admissions</button>
          <button type="button" data-preset="clinic">Implants</button>
        </div>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="results-head">
          <div>
            <p class="kicker">Buyer-ready output</p>
            <h2 id="oneLine"></h2>
            <p id="summary" class="summary"></p>
          </div>
          <div class="metric-grid">
            <div>
              <span id="topValue"></span>
              <small>top monthly value</small>
            </div>
            <div>
              <span id="paybackDays"></span>
              <small>payback</small>
            </div>
            <div>
              <span id="topScore"></span>
              <small>score</small>
            </div>
          </div>
        </div>

        <div class="map-band">
          <div>
            <p class="eyebrow">Opportunity map</p>
            <p id="mapLabel"></p>
          </div>
          <div id="map" class="opportunity-map" role="img" aria-label="Ranked AI opportunities plotted by value and readiness"></div>
        </div>

        <div id="opportunityList" class="opportunity-list"></div>

        <section class="asset-section" aria-labelledby="sales-assets-title">
          <div class="section-title-row">
            <h3 id="sales-assets-title">Sales assets</h3>
            <button type="button" id="copyAssets" class="icon-button" aria-label="Copy sales assets">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 7V5a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-2v1a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V10a3 3 0 0 1 3-3h2zm3-3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-6zM8 9H6a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1h-2a3 3 0 0 1-3-3V9z"></path>
              </svg>
            </button>
          </div>
          <div class="asset-grid">
            <article>
              <h4>Checkout copy</h4>
              <p id="checkoutCopy"></p>
            </article>
            <article>
              <h4>Outreach message</h4>
              <p id="outreachMessage"></p>
            </article>
            <article>
              <h4>Upsell hook</h4>
              <p id="upsellHook"></p>
            </article>
          </div>
        </section>

        <section class="plan-section" aria-labelledby="plan-title">
          <h3 id="plan-title">7-day first-dollar plan</h3>
          <ol id="executionPlan"></ol>
        </section>

        <section class="launch-section" aria-labelledby="launch-title">
          <div class="section-title-row">
            <div>
              <p class="kicker">Build mode</p>
              <h3 id="launch-title">Launch Console</h3>
            </div>
            <span id="launchStage" class="status-pill"></span>
          </div>
          <div class="policy-band">
            <p id="humanActionPolicy"></p>
            <strong id="goButtonLabel"></strong>
          </div>
          <div id="connectorList" class="connector-grid"></div>
          <article class="claude-packet">
            <div class="section-title-row">
              <h4>Claude handoff packet</h4>
              <button type="button" id="copyClaudePacket" class="icon-button" aria-label="Copy Claude packet">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 7V5a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-2v1a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V10a3 3 0 0 1 3-3h2zm3-3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-6zM8 9H6a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1h-2a3 3 0 0 1-3-3V9z"></path>
                </svg>
              </button>
            </div>
            <p id="claudePacketTitle"></p>
            <pre id="claudePacketBody" tabindex="0"></pre>
          </article>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js?v=20260723b"></script>
  </body>
</html>
