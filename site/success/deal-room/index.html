<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deal Room Success | Codex Revenue Lab</title>
    <meta name="description" content="AI Deal Room post-payment intake and member fulfillment packet.">
    <link rel="stylesheet" href="../../styles.css?v=20260723d">
  </head>
  <body class="success-page" data-success-route="deal-room">
    <main class="success-shell">
      <section class="success-hero" aria-labelledby="success-title">
        <div>
          <p class="eyebrow" id="success-eyebrow">Payment redirect</p>
          <h1 id="success-title">Deal Room intake</h1>
          <p id="success-intro"></p>
          <div class="success-actions">
            <a class="button button-secondary" href="../../">Back to sales site</a>
            <a class="button button-secondary" href="../../../demo/">Open Snapshot demo</a>
            <a class="button button-primary" id="payment-link" href="#" hidden>Open checkout</a>
          </div>
        </div>
        <aside class="success-status-card" aria-label="Payment status">
          <span id="route-status"></span>
          <dl>
            <div><dt>Processor</dt><dd id="processor-name"></dd></div>
            <div><dt>Amount</dt><dd id="offer-amount"></dd></div>
            <div><dt>Reference</dt><dd id="confirmation-reference"></dd></div>
            <div><dt>Status</dt><dd id="cash-status"></dd></div>
          </dl>
        </aside>
      </section>
      <section class="success-grid">
        <form class="success-card intake-card" id="buyer-intake-form">
          <div class="success-card-heading">
            <span>Member context</span>
            <strong id="save-status">Ready</strong>
          </div>
          <label>Buyer name <input name="buyerName" value="Lena Park" autocomplete="name"></label>
          <label>Buyer email <input name="buyerEmail" value="lena@example.com" autocomplete="email"></label>
          <label>Business name <input name="businessName" value="BrightPath Admissions"></label>
          <label>Website <input name="website" value="https://brightpath.example" inputmode="url"></label>
          <label>Workflow <input name="workflow" value="Weekly lead-to-enrollment board"></label>
          <label>Bottleneck <textarea name="bottleneck">Inbound inquiries are spread across forms, email, and text follow-ups.</textarea></label>
          <label>Target buyer <input name="targetBuyer" value="Parents comparing private school options"></label>
          <label>Notes <textarea name="notes">Start with one weekly deal board and three follow-up templates.</textarea></label>
          <button class="button button-primary" type="submit">Refresh packet</button>
        </form>
        <section class="success-card">
          <div class="success-card-heading">
            <span>Delivery next step</span>
            <strong>Membership</strong>
          </div>
          <p id="next-step"></p>
          <h2>Required fields</h2>
          <ul class="success-list" id="required-fields"></ul>
          <h2>Automation status</h2>
          <div class="success-plan-grid" id="automation-plan-grid"></div>
        </section>
      </section>
      <section class="success-output-grid">
        <article class="success-card">
          <div class="success-card-heading">
            <span>Copy-ready delivery brief</span>
            <button class="button button-secondary" type="button" data-copy-fulfillment-packet>Copy fulfillment packet</button>
          </div>
          <textarea id="fulfillment-packet" class="packet-box" readonly></textarea>
        </article>
        <article class="success-card">
          <div class="success-card-heading">
            <span>Challenge ledger row</span>
            <button class="button button-secondary" type="button" data-download-ledger-json>Download ledger JSON</button>
          </div>
          <pre id="ledger-preview" class="ledger-box"></pre>
        </article>
      </section>
    </main>
    <script type="module" src="../app.js?v=20260723d"></script>
  </body>
</html>
